<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Cadastro</title>
    <style>
        /* Fundo com Imagem de Alta Qualidade */
        body { 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        /* Efeito de Vidro (Glassmorphism) */
        .card { 
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); 
        }

        h2 { text-align: center; color: #3498db; margin-bottom: 25px; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        label { font-weight: bold; color: #bbb; display: block; margin-top: 15px; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        
        input { 
            width: 100%; padding: 12px; margin-top: 8px; 
            background-color: rgba(0, 0, 0, 0.5); 
            border: 1px solid #444; color: white; border-radius: 5px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3498db; box-shadow: 0 0 8px rgba(52, 152, 219, 0.5); }
        
        button { 
            width: 100%; padding: 14px; 
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
            color: white; border: none; border-radius: 5px; font-weight: bold; 
            margin-top: 30px; cursor: pointer; font-size: 16px; transition: 0.3s; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }
        
        .link { text-align: center; display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .link:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Conta</h2>
        <form id="form-cadastro">
            <label>Nome Completo</label>
            <input type="text" id="nome" required placeholder="Ex: João Silva">
            
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="Ex: joao@email.com">
            
            <label>CPF ou CNPJ</label>
            <input type="text" id="cpf_cnpj" required placeholder="Apenas números" oninput="mascaraDocumento(this)">
            
            <label>Senha</label>
            <input type="password" id="senha" required placeholder="Mínimo de 6 caracteres">
            
            <button type="submit">CADASTRAR</button>
        </form>
        <a href="login.html" class="link">Já tem conta? Faça Login</a>
    </div>

    <script>
        // Função para formatar o CPF/CNPJ enquanto o usuário digita
        function mascaraDocumento(input) {
            let v = input.value.replace(/\D/g, ""); // Remove tudo que não for número

            if (v.length <= 11) { // Máscara de CPF
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else { // Máscara de CNPJ
                v = v.substring(0, 14); // Limita a 14 números
                v = v.replace(/^(\d{2})(\d)/, "$1.$2");
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
                v = v.replace(/(\d{4})(\d)/, "$1-$2");
            }
            input.value = v;
        }

        document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validações Estruturais
            const senha = document.getElementById('senha').value;
            const cpfCnpjPuro = document.getElementById('cpf_cnpj').value.replace(/\D/g, "");

            if (senha.length < 6) {
                alert("Segurança insuficiente: A senha deve ter no mínimo 6 caracteres.");
                return;
            }

            if (cpfCnpjPuro.length !== 11 && cpfCnpjPuro.length !== 14) {
                alert("Por favor, insira um CPF (11 dígitos) ou CNPJ (14 dígitos) válido.");
                return;
            }

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf_cnpj: cpfCnpjPuro, // Salva limpo no banco
                senha: senha
            };

            try {
                const response = await fetch('/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                if (response.ok) {
                    alert("Conta criada com sucesso! Faça seu login.");
                    window.location.href = 'login.html';
                } else {
                    alert("Erro ao realizar o cadastro. Tente outro e-mail.");
                }
            } catch (err) {
                alert("Erro de conexão com o servidor Java.");
            }
        });
    </script>
</body>
</html>
