<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Notificações</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .topbar { background-color: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #3498db; display: flex; justify-content: space-between; align-items: center; }
        .topbar a { color: #ffffff; text-decoration: none; font-weight: bold; }
        .container { max-width: 700px; margin: 50px auto; padding: 30px; }
        h2 { color: #3498db; text-align: center; margin-bottom: 30px; }
        .notif-card { background-color: #1e1e1e; border-left: 4px solid #3498db; padding: 20px; border-radius: 0 8px 8px 0; margin-bottom: 15px; border-top: 1px solid #333; border-right: 1px solid #333; border-bottom: 1px solid #333; }
        .notif-title { font-weight: bold; font-size: 16px; }
        .notif-time { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="dashboard.html">← Voltar ao Painel</a>
        <span>Alertas</span>
    </div>
    <div class="container">
        <h2>🔔 Central de Alertas</h2>
        <div class="notif-card">
            <div class="notif-title">Sistema DriveCare configurado com sucesso!</div>
            <div class="notif-time">Disparado agora há pouco</div>
        </div>
    </div>
</body>
</html>
