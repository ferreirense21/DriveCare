<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Central de Alertas</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .topbar { background-color: rgba(11, 15, 25, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid rgba(56, 189, 248, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .topbar a { color: #ffffff; text-decoration: none; font-weight: bold; transition: 0.3s; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 40px; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }

        .notif-list { display: flex; flex-direction: column; gap: 20px; }

        /* Card de Notificação Premium */
        .notif-card { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(10px);
            border-left: 5px solid #38bdf8;
            padding: 20px; border-radius: 8px;
            display: flex; align-items: center; gap: 20px;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .notif-card:hover { transform: translateX(5px); background: rgba(30, 41, 59, 0.8); }

        .notif-card.urgent { border-left-color: #ef4444; }
        .notif-card.warning { border-left-color: #f59e0b; }

        .icon-box { font-size: 30px; }
        .content { flex-grow: 1; }
        .carro-info { font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .msg { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .time { font-size: 11px; color: #475569; margin-top: 5px; }

        .btn-action { 
            background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; 
            padding: 8px 15px; border-radius: 5px; font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { background: #38bdf8; color: #000; }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="dashboard.html">← Voltar ao Painel</a>
        <span>Central de Alertas</span>
    </div>

    <div class="container">
        <h2>🔔 Notificações da Frota</h2>
        
        <div class="notif-list" id="lista-alertas">
            </div>
    </div>

    <script>
        // Simulando eventos que chegam do sistema de telemetria
        const eventos = [
            { id: 1, tipo: 'urgent', carro: 'VW AMAROK - FYU0E77', msg: 'Pressão crítica: Pneu dianteiro esquerdo (18 PSI)', time: 'Há 5 min' },
            { id: 2, tipo: 'warning', carro: 'HYUNDAI HB20X - GHJ06T', msg: 'Revisão: Troca de óleo necessária em breve', time: 'Há 2 horas' },
            { id: 3, tipo: 'info', carro: 'HONDA CIVIC - NBM0155', msg: 'Sistema de telemetria operando dentro dos parâmetros', time: 'Hoje, 08:00' }
        ];

        const lista = document.getElementById('lista-alertas');
        eventos.forEach(e => {
            lista.innerHTML += `
                <div class="notif-card ${e.tipo}">
                    <div class="icon-box">${e.tipo === 'urgent' ? '🚨' : (e.tipo === 'warning' ? '⚠️' : 'ℹ️')}</div>
                    <div class="content">
                        <div class="carro-info">${e.carro}</div>
                        <div class="msg">${e.msg}</div>
                        <div class="time">${e.time}</div>
                    </div>
                    <button class="btn-action" onclick="alert('Redirecionando para o módulo de diagnóstico...')">VER DETALHES</button>
                </div>
            `;
        });
    </script>
</body>
</html>
