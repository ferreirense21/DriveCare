<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Painel de Telemetria</title>
    <style>
        /* Fundo super escuro igual ao seu print */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Barra no topo */
        .topbar {
            background-color: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 1px solid #3498db;
            display: flex;
            align-items: center;
        }
        .topbar a { color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; }
        
        .container { max-width: 900px; margin: 40px auto; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 20px; }

        /* Nova caixa de Seleção de Veículo */
        .seletor-container { margin-bottom: 20px; }
        select {
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #333;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus { border-color: #3498db; }

        /* Estilo exato da sua placa azul */
        .placa-badge {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 6px 15px;
            border-radius: 5px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 40px;
            font-size: 14px;
        }

        /* Os 4 quadrados de dados */
        .grid {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 25px 20px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .card h3 { color: #888; font-size: 12px; text-transform: uppercase; margin-top: 0; letter-spacing: 1px;}
        .card .valor { color: #3498db; font-size: 36px; font-weight: bold; margin-top: 15px;}

        /* A barra de Conexão Verde */
        .status-bar {
            background-color: rgba(39, 174, 96, 0.05);
            border: 1px solid rgba(39, 174, 96, 0.4);
            color: #2ecc71;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .dot {
            height: 10px; width: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 10px #2ecc71;
            animation: piscar 2s infinite;
        }
        @keyframes piscar { 50% { opacity: 0.4; } }

        .btn-voltar { color: #888; text-decoration: none; font-size: 14px; }
        .btn-voltar:hover { color: white; }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="dashboard.html">← Painel de Telemetria</a>
    </div>

    <div class="container">
        <h1>Status do Veículo</h1>

        <div class="seletor-container">
            <select id="seletor-carro" onchange="mudarCarro()">
                <option value="">Sincronizando garagem com o banco de dados...</option>
            </select>
        </div>

        <div class="placa-badge" id="placa-display">PLACA: AGUARDANDO...</div>

        <div class="grid">
            <div class="card">
                <h3>Nível de Óleo</h3>
                <div class="valor" id="val-oleo">--%</div>
            </div>
            <div class="card">
                <h3>Pressão Pneus</h3>
                <div class="valor" id="val-pneu">-- PSI</div>
            </div>
            <div class="card">
                <h3>Bateria</h3>
                <div class="valor" id="val-bat">--V</div>
            </div>
            <div class="card">
                <h3>Temperatura</h3>
                <div class="valor" id="val-temp">--°C</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="dot"></div>
            CONEXÃO COM OBD-II ESTÁVEL - SISTEMA OPERANDO NORMALMENTE
        </div>

        <a href="dashboard.html" class="btn-voltar">Voltar ao Dashboard</a>
    </div>

    <script>
        let intervalId; // Controla a atualização dos números

        // 1. Ao abrir a página, busca os carros do dono
        window.onload = async function() {
            const idUsuarioLogado = localStorage.getItem('usuarioId');
            
            if (!idUsuarioLogado) {
                alert("Sessão encerrada. Faça login novamente.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Chama a rota que nós criamos no Java
                const response = await fetch(`/veiculos/usuario/${idUsuarioLogado}`);
                const veiculos = await response.json();
                
                const seletor = document.getElementById('seletor-carro');
                seletor.innerHTML = ''; 

                if (veiculos.length === 0) {
                    seletor.innerHTML = '<option value="">Nenhum carro cadastrado</option>';
                    document.getElementById('placa-display').innerText = "SEM VEÍCULO";
                    return;
                }

                // Coloca o seu C3 e os próximos carros na lista de seleção
                veiculos.forEach(v => {
                    const option = document.createElement('option');
                    option.value = v.placa; // Deixamos a placa escondida no "value"
                    option.text = `${v.marca} ${v.modelo}`;
                    seletor.appendChild(option);
                });

                // Força iniciar a telemetria no primeiro carro da lista
                mudarCarro();

            } catch (error) {
                console.error("Erro ao buscar do Java:", error);
            }
        };

        // 2. Quando você troca de carro na caixinha, ele muda a placa azul e reseta os números
        function mudarCarro() {
            const seletor = document.getElementById('seletor-carro');
            const placaDoCarroSelecionado = seletor.value;
            
            if(placaDoCarroSelecionado) {
                document.getElementById('placa-display').innerText = `PLACA: ${placaDoCarroSelecionado.toUpperCase()}`;
                iniciarTelemetriaAoVivo();
            }
        }

        // 3. Fica trocando os números para parecer que o motor está ligado de verdade
        function iniciarTelemetriaAoVivo() {
            if(intervalId) clearInterval(intervalId); // Para o painel do carro anterior

            atualizarPainel(); // Atualiza na mesma hora

            // A cada 2 segundos e meio, os valores piscam e mudam
            intervalId = setInterval(atualizarPainel, 2500);
        }

        function atualizarPainel() {
            // Cálculos aleatórios só para simular um carro funcionando
            document.getElementById('val-oleo').innerText = Math.floor(Math.random() * (95 - 88 + 1) + 88) + '%';
            document.getElementById('val-pneu').innerText = Math.floor(Math.random() * (34 - 31 + 1) + 31) + ' PSI';
            document.getElementById('val-bat').innerText = (14.0 + Math.random() * 0.4).toFixed(1) + 'V';
            document.getElementById('val-temp').innerText = (85.0 + Math.random() * 4.0).toFixed(1) + '°C';
        }
    </script>
</body>
</html>
