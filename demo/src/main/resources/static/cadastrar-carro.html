<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Cadastrar Veículo</title>
    <style>
        /* Fundo com Imagem de Alta Qualidade */
        body { 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        /* Efeito de Vidro (Glassmorphism) */
        .card { 
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; max-width: 450px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }

        h2 { text-align: center; color: #38bdf8; margin-bottom: 30px; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 24px;}
        
        label { font-weight: bold; color: #94a3b8; display: block; margin-top: 20px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
        
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; 
            background-color: rgba(0, 0, 0, 0.5); 
            border: 1px solid #334155; color: white; border-radius: 8px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
            font-size: 15px; font-family: 'Segoe UI', sans-serif;
        }
        
        input:focus, select:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); background-color: rgba(0,0,0,0.7); }
        
        select option { background-color: #0f172a; color: white; }
        select:disabled { background-color: rgba(0, 0, 0, 0.2); color: #64748b; cursor: not-allowed; }

        .info-api { font-size: 11px; color: #10b981; text-align: right; margin-top: 5px; display: block; }
        
        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); 
            color: white; border: none; border-radius: 8px; font-weight: bold; 
            margin-top: 35px; cursor: pointer; font-size: 16px; transition: 0.3s; 
            letter-spacing: 1px; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4); }
        
        .back-link { text-align: center; display: block; margin-top: 25px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cadastrar Veículo</h2>
        <form id="form-veiculo">
            
            <label>Marca do Veículo</label>
            <select id="marca" required onchange="carregarModelos()">
                <option value="">Aguarde, conectando à base de dados...</option>
            </select>

            <label>Modelo</label>
            <select id="modelo" required disabled>
                <option value="">Selecione uma marca primeiro</option>
            </select>
            <span class="info-api">✓ Sincronizado com API FIPE</span>

            <label>Placa</label>
            <input type="text" id="placa" required placeholder="Ex: ABC1D23" maxlength="7" oninput="formatarPlaca(this)">

            <button type="submit">SALVAR VEÍCULO</button>
        </form>
        <a href="dashboard.html" class="back-link">← Cancelar e Voltar</a>
    </div>

    <script>
        const baseUrl = 'https://parallelum.com.br/fipe/api/v1/carros';

        // 1. Ao carregar a página, busca as Marcas oficiais
        window.onload = async function() {
            try {
                const response = await fetch(`${baseUrl}/marcas`);
                const marcas = await response.json();
                
                const selectMarca = document.getElementById('marca');
                selectMarca.innerHTML = '<option value="">Selecione a Marca</option>';
                
                marcas.forEach(marca => {
                    // Guardamos o código no value para a FIPE, mas guardamos o NOME num data-attribute para o nosso Java!
                    const option = document.createElement('option');
                    option.value = marca.codigo;
                    option.setAttribute('data-nome', marca.nome);
                    option.text = marca.nome;
                    selectMarca.appendChild(option);
                });
            } catch (error) {
                document.getElementById('marca').innerHTML = '<option value="">Erro ao conectar na API</option>';
            }
        };

        // 2. Quando seleciona a Marca, busca os Modelos
        async function carregarModelos() {
            const codigoMarca = document.getElementById('marca').value;
            const selectModelo = document.getElementById('modelo');

            if (!codigoMarca) {
                selectModelo.innerHTML = '<option value="">Selecione uma marca primeiro</option>';
                selectModelo.disabled = true;
                return;
            }

            selectModelo.disabled = false;
            selectModelo.innerHTML = '<option value="">Buscando modelos...</option>';

            try {
                const response = await fetch(`${baseUrl}/marcas/${codigoMarca}/modelos`);
                const dados = await response.json();
                
                selectModelo.innerHTML = '<option value="">Selecione o Modelo exato</option>';
                
                dados.modelos.forEach(modelo => {
                    const option = document.createElement('option');
                    option.value = modelo.codigo;
                    option.setAttribute('data-nome', modelo.nome);
                    option.text = modelo.nome;
                    selectModelo.appendChild(option);
                });
            } catch (error) {
                selectModelo.innerHTML = '<option value="">Erro ao buscar modelos</option>';
            }
        }

        // 3. Formata a placa para ficar sempre em Maiúsculo sem espaços
        function formatarPlaca(input) {
            input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        }

        // 4. Salva no Banco de Dados Java
        document.getElementById('form-veiculo').addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const idUsuarioLogado = localStorage.getItem('usuarioId');
            if (!idUsuarioLogado) {
                alert("Sessão expirada. Faça login novamente.");
                window.location.href = 'login.html';
                return;
            }

            // Pega o elemento <select> da tela
            const selectMarca = document.getElementById('marca');
            const selectModelo = document.getElementById('modelo');

            // Pega o NOME da marca e modelo escolhidos (e não o código da API)
            const nomeMarca = selectMarca.options[selectMarca.selectedIndex].getAttribute('data-nome');
            const nomeModelo = selectModelo.options[selectModelo.selectedIndex].getAttribute('data-nome');
            const valorPlaca = document.getElementById('placa').value;

            const dadosVeiculo = {
                marca: nomeMarca,
                modelo: nomeModelo,
                placa: valorPlaca,
                usuario: { id_usuario: parseInt(idUsuarioLogado) }
            };

            try {
                const response = await fetch('/veiculos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosVeiculo)
                });

                if (response.ok) {
                    window.location.href = 'garagem.html'; 
                } else {
                    alert("Erro ao salvar veículo no banco de dados.");
                }
            } catch (error) {
                alert("Erro de conexão. O servidor Java está rodando?");
            }
        });
    </script>
</body>
</html>
