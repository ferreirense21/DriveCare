<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Login</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e1e1e; padding: 40px; border-radius: 10px; border: 1px solid #333; width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #3498db; margin-bottom: 30px; margin-top: 0; letter-spacing: 1px; }
        label { font-weight: bold; color: #888; display: block; margin-top: 15px; text-transform: uppercase; font-size: 11px; }
        input { width: 100%; padding: 12px; margin-top: 8px; background-color: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 30px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .link { text-align: center; display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .link:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DRIVECARE</h2>
        <form id="form-login">
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com">
            <label>Senha</label>
            <input type="password" id="senha" required placeholder="••••••••">
            <button type="submit">ENTRAR</button>
        </form>
        <a href="cadastro.html" class="link">Não tem conta? Cadastre-se</a>
    </div>
    <script>
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                if (response.ok) {
                    const usuario = await response.json();
                    localStorage.setItem('usuarioId', usuario.id_usuario);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Usuário ou senha incorretos.");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>
</body>
</html>
