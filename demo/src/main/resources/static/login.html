<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Login</title>
    <style>
        body { 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .card { 
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px; border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; max-width: 360px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); 
        }
        h2 { text-align: center; color: #ffffff; margin-bottom: 30px; margin-top: 0; letter-spacing: 3px; font-size: 28px; }
        .destaque-logo { color: #3498db; }
        
        label { font-weight: bold; color: #bbb; display: block; margin-top: 15px; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        input { 
            width: 100%; padding: 12px; margin-top: 8px; 
            background-color: rgba(0, 0, 0, 0.5); 
            border: 1px solid #444; color: white; border-radius: 5px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3498db; box-shadow: 0 0 8px rgba(52, 152, 219, 0.5); }
        
        button { 
            width: 100%; padding: 14px; 
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
            color: white; border: none; border-radius: 5px; font-weight: bold; 
            margin-top: 30px; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }
        
        .link { text-align: center; display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .link:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DRIVE<span class="destaque-logo">CARE</span></h2>
        <form id="form-login">
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com">
            
            <label>Senha</label>
            <input type="password" id="senha" required placeholder="••••••••">
            
            <button type="submit">ACESSAR PAINEL</button>
        </form>
        <a href="cadastro.html" class="link">Não tem conta? Cadastre-se</a>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                
                if (response.ok) {
                    const usuario = await response.json();
                    localStorage.setItem('usuarioId', usuario.id_usuario);
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Acesso negado: Usuário ou senha incorretos.");
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>
</body>
</html>
