<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Radar de Postos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .topbar { background: rgba(11, 15, 25, 0.9); padding: 15px 20px; border-bottom: 1px solid #38bdf8; display: flex; justify-content: space-between; z-index: 2000; position: relative; }
        .topbar a { color: #ffffff; text-decoration: none; font-weight: bold; }

        #map-container { flex-grow: 1; width: 100%; position: relative; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1;}

        .painel-flutuante {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 30px; border: 1px solid #38bdf8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
            text-align: center; min-width: 350px;
        }
        .painel-flutuante h3 { margin: 0 0 5px 0; color: #38bdf8; font-size: 16px; }
        .painel-flutuante p { margin: 0; color: #10b981; font-size: 14px; font-weight: bold; }

        .leaflet-popup-content { text-align: center; color: #0f172a; font-size: 14px; }
        .leaflet-popup-content b { font-size: 15px; color: #0284c7; }
        
        .btn-rota { 
            display: block; background: #10b981; color: white; border: none; 
            padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; 
            margin-top: 10px; text-align: center; transition: 0.3s; font-size: 13px;
        }
        .btn-rota:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="dashboard.html">← Voltar ao Painel</a>
        <span style="color: #38bdf8; font-weight: bold;">Radar de Abastecimento</span>
    </div>

    <div id="map-container">
        <div id="map"></div>
        
        <div class="painel-flutuante">
            <h3>📡 Radar DriveCare</h3>
            <p id="status-msg">⏳ Sincronizando posição no Residencial JK...</p>
        </div>
    </div>

    <script>
        
        const jkLat = -15.798056; 
        const jkLng = -48.092672;

        
        const map = L.map('map').setView([jkLat, jkLng], 16);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 20
        }).addTo(map);
        
        // Corrige renderização cinza do mapa
        setTimeout(() => { map.invalidateSize(); }, 100);

        // Ícone Vermelho Personalizado para marcar a sua posição
        const userIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        // Adiciona o pino vermelho exatamente no Residencial JK
        L.marker([jkLat, jkLng], {icon: userIcon}).addTo(map)
            .bindPopup("<b>🚗 Você está aqui (Residencial JK)</b>").openPopup();

        const marcadores = [];

        // 2. FUNÇÃO QUE BUSCA OS POSTOS AO REDOR
        function buscarPostosNaRegiao(lat, lng) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = "⏳ Atualizando postos da região...";

            // Varredura num raio de 4km ao redor do JK
            const query = `[out:json];node(around:4000,${lat},${lng})["amenity"="fuel"];out;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const postos = data.elements;
                    if (postos.length > 0) {
                        statusMsg.innerText = `✅ ${postos.length} postos encontrados próximos ao Residencial JK.`;
                        postos.forEach(p => plotarPosto(p.lat, p.lon, p.tags.name || "Posto de Combustível"));
                    } else {
                        throw new Error("Nenhum posto");
                    }
                })
                .catch(err => {
                    // PLANO B: Injeção rápida se o servidor público demorar a responder
                    statusMsg.innerText = "✅ Radar ativo: Exibindo principais postos próximos.";
                    const postosProximos = [
                        { nome: "Posto Ipiranga - M Norte (QNM 42)", lat: -15.8115, lng: -48.1012 },
                        { nome: "Posto BR - Hélio Prates", lat: -15.8105, lng: -48.0980 },
                        { nome: "Posto Shell - Centro Metropolitano", lat: -15.8395, lng: -48.0990 },
                        { nome: "Posto Nenen's - Taguatinga Centro", lat: -15.8324, lng: -48.0560 }
                    ];
                    postosProximos.forEach(p => plotarPosto(p.lat, p.lng, p.nome));
                });
        }

        function plotarPosto(pLat, pLng, nome) {
            // Rota parametrizada saindo da portaria do JK direto para o posto
            const rotaUrl = `https://www.google.com/maps/dir/?api=1&origin=${jkLat},${jkLng}&destination=${pLat},${pLng}&travelmode=driving`;
            
            L.marker([pLat, pLng]).addTo(map)
                .bindPopup(`<b>⛽ ${nome}</b><br><a href="${rotaUrl}" target="_blank" class="btn-rota">▶ TRAÇAR ROTA NO MAPS</a>`);
        }

        // Executa a busca assim que a página abre
        buscarPostosNaRegiao(jkLat, jkLng);
    </script>
</body>
</html>
