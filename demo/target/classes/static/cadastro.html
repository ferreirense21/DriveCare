<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Cadastro</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background-color: #1e1e1e; padding: 40px; border-radius: 10px; border: 1px solid #333; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #3498db; margin-bottom: 25px; margin-top: 0; }
        label { font-weight: bold; color: #888; display: block; margin-top: 15px; text-transform: uppercase; font-size: 11px; }
        input { width: 100%; padding: 12px; margin-top: 8px; background-color: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 30px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .link { text-align: center; display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .link:hover { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Conta</h2>
        <form id="form-cadastro">
            <label>Nome Completo</label>
            <input type="text" id="nome" required placeholder="Ex: João Silva">
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="Ex: joao@email.com">
            <label>CPF ou CNPJ</label>
            <input type="text" id="cpf_cnpj" required placeholder="Apenas números">
            <label>Senha</label>
            <input type="password" id="senha" required placeholder="No mínimo 6 caracteres">
            <button type="submit">CADASTRAR</button>
        </form>
        <a href="login.html" class="link">Já tem conta? Faça Login</a>
    </div>
    <script>
        document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf_cnpj: document.getElementById('cpf_cnpj').value,
                senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch('/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                if (response.ok) {
                    alert("Conta criada com sucesso!");
                    window.location.href = 'login.html';
                } else {
                    alert("Erro ao realizar o cadastro.");
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
            }
        });
    </script>
</body>
</html>
