<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Tabela FIPE</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        .topbar { 
            background-color: #1a1a1a; 
            padding: 15px 20px; 
            border-bottom: 1px solid #3498db; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .topbar a { 
            color: #ffffff; 
            text-decoration: none; 
            font-weight: bold; 
        }
        
        .container { 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 40px; 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        h2 { 
            color: #3498db; 
            margin-top: 0; 
            font-size: 26px; 
            margin-bottom: 10px; 
        }
        
        p { 
            color: #888; 
            margin-bottom: 30px; 
            font-size: 14px; 
        }
        
        .select-group { 
            margin-bottom: 20px; 
            text-align: left;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        select { 
            width: 100%; 
            padding: 15px; 
            background-color: #2a2a2a; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            transition: border-color 0.3s; 
            cursor: pointer;
        }
        
        select:focus { 
            border-color: #3498db; 
        }

        select:disabled {
            background-color: #1a1a1a;
            color: #555;
            cursor: not-allowed;
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        button:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); 
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Caixa onde o resultado do valor vai aparecer */
        #resultado-fipe {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background-color: #1a1a1a;
            border-left: 4px solid #2ecc71;
            border-radius: 8px;
            text-align: left;
        }

        #resultado-fipe h3 { margin: 0 0 10px 0; color: #fff; font-size: 18px; }
        #valor-preco { color: #2ecc71; font-size: 32px; font-weight: bold; margin: 10px 0; }
        #detalhes-carro { color: #888; font-size: 14px; margin: 0;}

    </style>
</head>
<body>

    <div class="topbar">
        <a href="dashboard.html">← Voltar ao Painel</a>
        <span>Consulta FIPE</span>
    </div>

    <div class="container">
        <h2>💵 Consultar Valor FIPE</h2>
        <p>Selecione as opções abaixo para buscar o valor de mercado atualizado.</p>
        
        <div class="select-group">
            <label>Marca do Veículo</label>
            <select id="select-marca" onchange="carregarModelos()">
                <option value="">Aguarde, carregando marcas...</option>
            </select>
        </div>

        <div class="select-group">
            <label>Modelo</label>
            <select id="select-modelo" onchange="carregarAnos()" disabled>
                <option value="">Selecione uma marca primeiro</option>
            </select>
        </div>

        <div class="select-group">
            <label>Ano de Fabricação / Versão</label>
            <select id="select-ano" onchange="liberarBotao()" disabled>
                <option value="">Selecione um modelo primeiro</option>
            </select>
        </div>
        
        <button id="btn-buscar" onclick="buscarPreco()" disabled>Buscar Preço na Tabela FIPE</button>

        <div id="resultado-fipe">
            <h3>Valor de Mercado:</h3>
            <div id="valor-preco">R$ 0,00</div>
            <p id="detalhes-carro">Modelo do Carro</p>
        </div>
    </div>

    <script>
        const baseUrl = 'https://parallelum.com.br/fipe/api/v1/carros';

        // 1. Ao abrir a página, busca todas as marcas de carros da API pública
        window.onload = async function() {
            try {
                const response = await fetch(`${baseUrl}/marcas`);
                const marcas = await response.json();
                
                const selectMarca = document.getElementById('select-marca');
                selectMarca.innerHTML = '<option value="">Selecione a Marca</option>';
                
                marcas.forEach(marca => {
                    const option = document.createElement('option');
                    option.value = marca.codigo;
                    option.text = marca.nome;
                    selectMarca.appendChild(option);
                });
            } catch (error) {
                document.getElementById('select-marca').innerHTML = '<option value="">Erro ao conectar na FIPE</option>';
            }
        };

        // 2. Quando seleciona a marca, busca os modelos daquela marca
        async function carregarModelos() {
            const codigoMarca = document.getElementById('select-marca').value;
            const selectModelo = document.getElementById('select-modelo');
            const selectAno = document.getElementById('select-ano');
            const btnBuscar = document.getElementById('btn-buscar');
            const resultado = document.getElementById('resultado-fipe');

            // Reseta os campos abaixo
            selectAno.innerHTML = '<option value="">Selecione um modelo primeiro</option>';
            selectAno.disabled = true;
            btnBuscar.disabled = true;
            resultado.style.display = 'none';

            if (!codigoMarca) {
                selectModelo.innerHTML = '<option value="">Selecione uma marca primeiro</option>';
                selectModelo.disabled = true;
                return;
            }

            selectModelo.disabled = false;
            selectModelo.innerHTML = '<option value="">Buscando modelos...</option>';

            try {
                const response = await fetch(`${baseUrl}/marcas/${codigoMarca}/modelos`);
                const dados = await response.json();
                
                selectModelo.innerHTML = '<option value="">Selecione o Modelo</option>';
                
                dados.modelos.forEach(modelo => {
                    const option = document.createElement('option');
                    option.value = modelo.codigo;
                    option.text = modelo.nome;
                    selectModelo.appendChild(option);
                });
            } catch (error) {
                selectModelo.innerHTML = '<option value="">Erro ao buscar modelos</option>';
            }
        }

        // 3. Quando seleciona o modelo, busca os anos e versões disponíveis
        async function carregarAnos() {
            const codigoMarca = document.getElementById('select-marca').value;
            const codigoModelo = document.getElementById('select-modelo').value;
            const selectAno = document.getElementById('select-ano');
            const btnBuscar = document.getElementById('btn-buscar');
            const resultado = document.getElementById('resultado-fipe');

            btnBuscar.disabled = true;
            resultado.style.display = 'none';

            if (!codigoModelo) {
                selectAno.innerHTML = '<option value="">Selecione um modelo primeiro</option>';
                selectAno.disabled = true;
                return;
            }

            selectAno.disabled = false;
            selectAno.innerHTML = '<option value="">Buscando anos...</option>';

            try {
                const response = await fetch(`${baseUrl}/marcas/${codigoMarca}/modelos/${codigoModelo}/anos`);
                const anos = await response.json();
                
                selectAno.innerHTML = '<option value="">Selecione o Ano/Versão</option>';
                
                anos.forEach(ano => {
                    const option = document.createElement('option');
                    option.value = ano.codigo;
                    option.text = ano.nome;
                    selectAno.appendChild(option);
                });
            } catch (error) {
                selectAno.innerHTML = '<option value="">Erro ao buscar anos</option>';
            }
        }

        // 4. Libera o botão azul de pesquisa quando tudo foi selecionado
        function liberarBotao() {
            const codigoAno = document.getElementById('select-ano').value;
            const btnBuscar = document.getElementById('btn-buscar');
            
            if (codigoAno) {
                btnBuscar.disabled = false;
            } else {
                btnBuscar.disabled = true;
            }
        }

        // 5. O Grande Final: Busca o valor real e exibe na tela!
        async function buscarPreco() {
            const codigoMarca = document.getElementById('select-marca').value;
            const codigoModelo = document.getElementById('select-modelo').value;
            const codigoAno = document.getElementById('select-ano').value;
            const btnBuscar = document.getElementById('btn-buscar');
            const resultado = document.getElementById('resultado-fipe');

            btnBuscar.innerText = "Consultando Tabela FIPE...";
            btnBuscar.disabled = true;

            try {
                const response = await fetch(`${baseUrl}/marcas/${codigoMarca}/modelos/${codigoModelo}/anos/${codigoAno}`);
                const veiculo = await response.json();
                
                // Preenche o quadro verde com os dados reais da API
                document.getElementById('valor-preco').innerText = veiculo.Valor;
                document.getElementById('detalhes-carro').innerText = `${veiculo.Marca} ${veiculo.Modelo} (${veiculo.AnoModelo}) - Ref: ${veiculo.MesReferencia}`;
                
                // Mostra o quadro
                resultado.style.display = 'block';
            } catch (error) {
                alert("Erro ao consultar a base de dados da FIPE. Tente novamente.");
            } finally {
                btnBuscar.innerText = "Buscar Preço na Tabela FIPE";
                btnBuscar.disabled = false;
            }
        }
    </script>
</body>
</html>
