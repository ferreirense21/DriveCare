<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Dashboard</title>
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flutuar {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        body { 
            background-color: #0b0f19; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; position: relative; overflow-x: hidden;
        }

        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: #0b0f19; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: flutuar 15s infinite alternate ease-in-out; }
        .orb-1 { top: -100px; left: -100px; width: 500px; height: 500px; background: #1e3a8a; }
        .orb-2 { bottom: -150px; right: -50px; width: 600px; height: 600px; background: #064e3b; animation-delay: -5s; }
        .orb-3 { top: 40%; left: 30%; width: 400px; height: 400px; background: #312e81; animation-delay: -10s; }

        .topbar { width: 100%; background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(20px); padding: 20px 0; border-bottom: 1px solid rgba(52, 152, 219, 0.2); text-align: center; box-sizing: border-box; }
        .topbar h1 { margin: 0; font-size: 26px; letter-spacing: 3px; font-weight: bold; }
        .topbar h1 span { color: #3498db; }
        
        .container { width: 100%; max-width: 1100px; padding: 50px 20px; box-sizing: border-box; text-align: center; }
        p.boas-vindas { color: #cbd5e1; font-size: 18px; margin-bottom: 50px; font-weight: 300; letter-spacing: 1px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
        
        .card-menu { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 40px 20px; 
            text-decoration: none; color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; animation: fadeUp 0.6s ease-out forwards; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .card-menu:nth-child(1) { animation-delay: 0.1s; }
        .card-menu:nth-child(2) { animation-delay: 0.2s; }
        .card-menu:nth-child(3) { animation-delay: 0.3s; }
        .card-menu:nth-child(4) { animation-delay: 0.4s; }
        .card-menu:nth-child(5) { animation-delay: 0.5s; }
        .card-menu:nth-child(6) { animation-delay: 0.6s; }
        .card-menu:nth-child(7) { animation-delay: 0.7s; }
        .card-menu:nth-child(8) { animation-delay: 0.8s; }
        .card-menu:nth-child(9) { animation-delay: 0.9s; } /* Para o novo card */

        .card-menu:hover { border-color: rgba(52, 152, 219, 0.5); transform: translateY(-10px) scale(1.02); background: rgba(255, 255, 255, 0.08); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(52, 152, 219, 0.2); z-index: 10; }
        .card-menu i { font-size: 45px; margin-bottom: 20px; transition: transform 0.3s; }
        .card-menu:hover i { transform: scale(1.15); }
        .card-menu h3 { margin: 0; font-size: 16px; color: #3498db; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        
        .btn-sair { display: inline-block; margin-top: 60px; color: #e74c3c; text-decoration: none; font-weight: bold; border: 1px solid rgba(231, 76, 60, 0.5); padding: 12px 35px; border-radius: 8px; transition: 0.3s; background: rgba(231, 76, 60, 0.05); cursor: pointer; font-size: 16px; letter-spacing: 1px; }
        .btn-sair:hover { background-color: #e74c3c; color: white; box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="topbar">
        <h1>DRIVE<span>CARE</span></h1>
    </div>

    <div class="container">
        <p class="boas-vindas" id="msg-boas-vindas">Bem-vindo ao seu painel de controle automotivo.</p>

        <div class="menu-grid">
            <a href="garagem.html" class="card-menu">
                <i>🚘</i>
                <h3>Minha Frota</h3>
            </a>
            <a href="cadastrar-carro.html" class="card-menu">
                <i>➕</i>
                <h3>Cadastrar Veículo</h3>
            </a>
            <a href="monitoramento.html" class="card-menu">
                <i>📊</i>
                <h3>Telemetria</h3>
            </a>
            <a href="manutencao.html" class="card-menu">
                <i>🔧</i>
                <h3>Manutenção</h3>
            </a>
            <a href="notificacoes.html" class="card-menu">
                <i>🔔</i>
                <h3>Central de Alertas</h3>
            </a>
            <a href="postos.html" class="card-menu">
                <i>⛽</i>
                <h3>Localize um Posto aqui!</h3>
            </a>
            <a href="fipe.html" class="card-menu">
                <i>💵</i>
                <h3>Tabela FIPE</h3>
            </a>
            <a href="planos.html" class="card-menu">
                <i>🛡️</i>
                <h3>Planos & Proteção</h3>
            </a>
            <a href="perfil.html" class="card-menu">
                <i>👤</i>
                <h3>Meu Perfil</h3>
            </a>
        </div>

        <button class="btn-sair" onclick="fazerLogout()">Encerrar Sessão</button>
    </div>

    <script>
        window.onload = async function() {
            const idUsuarioLogado = localStorage.getItem('usuarioId');
            
            if (!idUsuarioLogado) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`/usuarios/${idUsuarioLogado}`);
                if (response.ok) {
                    const usuario = await response.json();
                    document.getElementById('msg-boas-vindas').innerText = `Bem-vindo ao seu painel de controle automotivo, ${usuario.nome}.`;
                }
            } catch (error) {
                console.warn("API offline no momento, utilizando mensagem padrão.");
            }
        };

        function fazerLogout() {
            localStorage.removeItem('usuarioId');
            window.location.href = 'login.html';
        }
    </script>
    <div id="toast-notificacao" style="
    visibility: hidden; min-width: 250px; background-color: #1e293b; color: #fff; 
    text-align: left; border-left: 5px solid #38bdf8; border-radius: 8px; padding: 16px; 
    position: fixed; z-index: 9999; right: 30px; bottom: 30px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
    transform: translateY(100px); opacity: 0; transition: all 0.5s ease-in-out;">
    <strong id="toast-titulo" style="color: #38bdf8; display: block; margin-bottom: 5px; font-size: 16px;">Alerta</strong>
    <span id="toast-mensagem" style="font-size: 14px; color: #cbd5e1;">Sua mensagem aqui</span>
</div>

<script>
    // 1. CONEXÃO EM TEMPO REAL COM O SPRING BOOT
    // O EventSource é nativo do navegador, não precisa de bibliotecas extras!
    const canalNotificacoes = new EventSource('/api/notificacoes/stream');

    // 2. O QUE FAZER QUANDO O JAVA GRITAR "alerta-drivecare"
    canalNotificacoes.addEventListener('alerta-drivecare', function(event) {
        
        // Transforma o texto que o Java mandou em um objeto JavaScript
        const dados = JSON.parse(event.data);
        
        // Mostra na tela
        exibirToast(dados.titulo, dados.mensagem);
    });

    // 3. FUNÇÃO PARA ANIMAR A NOTIFICAÇÃO NA TELA
    function exibirToast(titulo, mensagem) {
        const toast = document.getElementById("toast-notificacao");
        document.getElementById("toast-titulo").innerText = titulo;
        document.getElementById("toast-mensagem").innerText = mensagem;

        // Faz a caixinha subir e aparecer
        toast.style.visibility = "visible";
        toast.style.transform = "translateY(0)";
        toast.style.opacity = "1";

        // Depois de 5 segundos, ela desce e some sozinha
        setTimeout(function(){ 
            toast.style.transform = "translateY(100px)";
            toast.style.opacity = "0";
            setTimeout(() => toast.style.visibility = "hidden", 500);
        }, 5000);
    }
</script>
</body>
</html>
