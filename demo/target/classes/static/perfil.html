<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DriveCare - Meu Perfil</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .topbar { background-color: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #3498db; display: flex; justify-content: space-between; align-items: center; }
        .topbar a { color: #ffffff; text-decoration: none; font-weight: bold; }
        .container { max-width: 600px; margin: 50px auto; padding: 30px; background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; }
        h2 { color: #3498db; margin-top: 0; margin-bottom: 30px; }
        .info-group { margin-bottom: 20px; border-bottom: 1px solid #2a2a2a; padding-bottom: 15px; }
        .info-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        .info-value { font-size: 18px; margin-top: 5px; color: #fff; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="dashboard.html">← Voltar ao Painel</a>
        <span>Meu Perfil</span>
    </div>
    <div class="container">
        <h2>Dados do Usuário</h2>
        <div class="info-group">
            <div class="info-label">Nome</div>
            <div class="info-value" id="prof-nome">Carregando...</div>
        </div>
        <div class="info-group">
            <div class="info-label">E-mail</div>
            <div class="info-value" id="prof-email">Carregando...</div>
        </div>
        <div class="info-group">
            <div class="info-label">CPF / CNPJ</div>
            <div class="info-value" id="prof-doc">Carregando...</div>
        </div>
    </div>
    <script>
        window.onload = async function() {
            const id = localStorage.getItem('usuarioId');
            if(!id) { window.location.href = 'login.html'; return; }
            try {
                const response = await fetch(`/usuarios/${id}`);
                if(response.ok) {
                    const u = await response.json();
                    document.getElementById('prof-nome').innerText = u.nome;
                    document.getElementById('prof-email').innerText = u.email;
                    document.getElementById('prof-doc').innerText = u.cpf_cnpj;
                }
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
